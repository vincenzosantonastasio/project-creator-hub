<title>Creator Hub</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:white;
}

.container {
  padding:16px;
}

.tabs, .subtabs {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

button {
  background:#1f1f1f;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

.active {
  background:#ff0000;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.card {
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
}

.card img {
  width:100%;
}

.info {
  padding:8px;
}

.date {
  font-size:12px;
  color:#aaa;
}

/* STORIES */
.stories {
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-bottom:12px;
}

.story {
  text-align:center;
}

.story img {
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid #ff0000;
}

/* Twitch */
.twitch {
  background:#1a1a1a;
  padding:40px;
  text-align:center;
  border-radius:12px;
}
</style>
</head>

<script>
function showPlatform(p){
  document.getElementById('youtube').style.display='none';
  document.getElementById('instagram').style.display='none';
  document.getElementById('twitch').style.display='none';
  document.getElementById(p).style.display='block';
}

function showYT(t){
  document.getElementById('yt-video').style.display = t==='video'?'grid':'none';
  document.getElementById('yt-shorts').style.display = t==='shorts'?'grid':'none';
}
</script>
