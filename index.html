<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Hub</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  background: linear-gradient(135deg, #f3eaff, #e6dcff);
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  padding: 20px;
  padding-bottom: 80px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.header h1 {
  font-size: 22px;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: url('https://i.pravatar.cc/100') center/cover;
}

/* TABS */
.tabs {
  display: flex;
  background: #e6e1f2;
  border-radius: 16px;
  padding: 4px;
  margin-bottom: 16px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  color: #777;
}

.tab.active {
  background: linear-gradient(135deg, #6c4eff, #7d5fff);
  color: white;
}

/* CARD */
.card {
  background: white;
  border-radius: 16px;
  padding: 12px;
  margin-bottom: 16px;
}

.creator {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.creator img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  margin-right: 10px;
}

.creator-name {
  font-weight: 600;
}

.platform-label {
  font-size: 11px;
  color: #777;
  margin: 6px 0 2px;
}

.thumb {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 6px;
}

.cta {
  margin-top: 10px;
  text-align: center;
  padding: 10px;
  border-radius: 10px;
  background: #6c4eff;
  color: white;
  font-weight: 600;
  text-decoration: none;
  display: block;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 420px;
  display: flex;
  background: white;
  padding: 12px 0;
  border-top: 1px solid #eee;
}

.nav-item {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: #777;
  text-decoration: none;
}

.nav-item.active {
  color: #6c4eff;
  font-weight: 600;
}
</style>

</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h1>Creator Hub</h1>
    <div class="avatar"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" id="feedTab">Feed</div>
    <div class="tab" id="catchupTab">Catch-Up</div>
  </div>

  <!-- FEED -->
  <div id="feedContent">

    <div class="card">
      <div class="creator">
        <img src="https://i.pravatar.cc/150?img=3">
        <div class="creator-name">MrBeast</div>
      </div>

      <div class="platform-label">YouTube</div>
      <img class="thumb" src="https://picsum.photos/400/210">

      <div class="platform-label">TikTok</div>
      <img class="thumb" src="https://picsum.photos/400/211">

      <div class="platform-label">Instagram</div>
      <img class="thumb" src="https://picsum.photos/400/212">

      <div class="platform-label">LIVE (Twitch)</div>
      <img class="thumb" src="https://picsum.photos/400/213">

      <a href="creator.html" class="cta">View Creator Hub</a>
    </div>

  </div>

  <!-- CATCH-UP -->
  <div id="catchupContent" style="display:none;">

    <div class="card">
      <div class="creator">
        <img src="https://i.pravatar.cc/150?img=5">
        <div class="creator-name">Nathan Berry</div>
      </div>

      <div class="platform-label">YouTube • NEW</div>
      <img class="thumb" src="https://picsum.photos/400/214">

      <div class="platform-label">TikTok • NEW</div>
      <img class="thumb" src="https://picsum.photos/400/215">

      <a href="creator.html" class="cta">View Creator Hub</a>
    </div>

  </div>

</div>

<!-- NAV -->
<div class="nav">
  <a href="index.html" class="nav-item active">Home</a>
  <a href="following.html" class="nav-item">Following</a>
  <a href="discover.html" class="nav-item">Discover</a>
  <a href="saved.html" class="nav-item">Saved</a>
  <a href="profile.html" class="nav-item">Profile</a>
</div>

<script>
const feedTab = document.getElementById("feedTab");
const catchupTab = document.getElementById("catchupTab");

const feedContent = document.getElementById("feedContent");
const catchupContent = document.getElementById("catchupContent");

feedTab.onclick = () => {
  feedTab.classList.add("active");
  catchupTab.classList.remove("active");
  feedContent.style.display = "block";
  catchupContent.style.display = "none";
};

catchupTab.onclick = () => {
  catchupTab.classList.add("active");
  feedTab.classList.remove("active");
  feedContent.style.display = "none";
  catchupContent.style.display = "block";
};
</script>

</body>
</html>
