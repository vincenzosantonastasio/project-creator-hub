<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Hub</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:linear-gradient(135deg,#f3eaff,#e6dcff);display:flex;justify-content:center}
.app{width:100%;max-width:420px;min-height:100vh;padding:20px;padding-bottom:90px}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.header h1{font-size:22px}
.avatar{width:36px;height:36px;border-radius:50%;background:url('https://i.pravatar.cc/100') center/cover}

.toggle{display:flex;background:white;border-radius:12px;padding:4px;margin-bottom:16px}
.toggle button{flex:1;border:none;padding:8px;border-radius:10px;font-weight:600;background:none;color:#777;cursor:pointer}
.toggle .active{background:#6c4eff;color:white}

.card{background:white;border-radius:16px;padding:12px;margin-bottom:16px}
.creator{display:flex;align-items:center;margin-bottom:10px}
.creator img{width:36px;height:36px;border-radius:50%;margin-right:10px}

.platforms{display:flex;gap:6px;margin-bottom:10px}
.platform{flex:1;text-align:center;padding:6px;border-radius:8px;background:#eee;font-size:11px;cursor:pointer}
.platform.active{background:#6c4eff;color:white}

.item{display:flex;margin-bottom:10px;text-decoration:none;color:black}
.item img{width:110px;height:70px;border-radius:8px;margin-right:10px;object-fit:cover}
.meta{font-size:11px;color:#777}

.badge{font-size:10px;background:#6c4eff;color:white;padding:2px 6px;border-radius:6px;margin-left:6px}

.cta{text-align:center;margin-top:10px;font-weight:600;color:#6c4eff;text-decoration:none;display:block}

.nav{position:fixed;bottom:0;width:100%;max-width:420px;display:flex;background:white;border-top:1px solid #eee}
.nav a{flex:1;text-align:center;padding:12px 0;font-size:12px;text-decoration:none;color:#777}
.nav a.active{color:#6c4eff;font-weight:600}
</style>
</head>

<body>

<div class="app">

<div class="header">
<h1>Creator Hub</h1>
<div class="avatar"></div>
</div>

<div class="toggle">
<button id="feedBtn" class="active" onclick="switchView('feed')">Feed</button>
<button id="catchBtn" onclick="switchView('catch')">Catch-Up</button>
</div>

<div class="card">

<div class="creator">
<img src="https://i.pravatar.cc/150?img=3">
<strong>MrBeast</strong>
</div>

<div class="platforms">
<div class="platform active" onclick="switchPlatform('youtube', this)">YouTube</div>
<div class="platform" onclick="switchPlatform('ig', this)">Instagram</div>
<div class="platform" onclick="switchPlatform('tiktok', this)">TikTok</div>
<div class="platform" onclick="switchPlatform('twitch', this)">Twitch</div>
</div>

<div id="content"></div>

<a href="creator.html?id=mrbeast" class="cta">View Creator Hub →</a>

</div>

</div>

<div class="nav">
<a href="#" class="active">Home</a>
<a href="#">Following</a>
<a href="#">Discover</a>
<a href="#">Saved</a>
<a href="#">Profile</a>
</div>

<script>
let platform = "youtube";
let view = "feed";

const youtubeData = [
  {
    title:"Trapped On An Island Until I Build a Boat",
    img:"https://img.youtube.com/vi/JFtlf8RoPZY/maxresdefault.jpg"
  },
  {
    title:"Survive 30 Days Stranded With Your EX",
    img:"https://img.youtube.com/vi/AoN1K4c7VKE/maxresdefault.jpg"
  },
  {
    title:"I Built 10 Schools Around the World",
    img:"https://img.youtube.com/vi/5OLs1GWB4OA/maxresdefault.jpg"
  },
  {
    title:"World's Strongest Man vs Robot",
    img:"https://img.youtube.com/vi/Ah_uuTwGOYU/maxresdefault.jpg"
  }
];

function render(){
  const container = document.getElementById("content");
  container.innerHTML = "";

  let data = youtubeData;

  data.forEach(item=>{
    container.innerHTML += `
      <div class="item">
        <img src="${item.img}">
        <div>
          <div>
            ${item.title}
            ${view === "catch" ? '<span class="badge">NEW</span>' : ''}
          </div>
          <div class="meta">${platform.toUpperCase()} • VIDEO</div>
        </div>
      </div>
    `;
  });
}

function switchPlatform(p, el){
  platform = p;
  document.querySelectorAll(".platform").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
  render();
}

function switchView(v){
  view = v;

  document.getElementById("feedBtn").classList.remove("active");
  document.getElementById("catchBtn").classList.remove("active");

  if(v === "feed"){
    document.getElementById("feedBtn").classList.add("active");
  } else {
    document.getElementById("catchBtn").classList.add("active");
  }

  render();
}

render();
</script>

</body>
</html>
