<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch-Up - Creator Hub</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  background: linear-gradient(135deg, #f3eaff, #e6dcff);
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  padding: 20px;
  padding-bottom: 80px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.header h1 {
  font-size: 22px;
  font-weight: 700;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: url('https://i.pravatar.cc/100') center/cover;
}

/* TABS */
.tabs {
  display: flex;
  background: #fff;
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 16px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 8px;
  border-radius: 10px;
  font-weight: 600;
  color: #888;
  text-decoration: none;
}

.tab.active {
  background: #6c4eff;
  color: white;
}

/* TITLE */
.page-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 12px;
}

/* CARD */
.card {
  background: white;
  border-radius: 16px;
  padding: 12px;
  margin-bottom: 12px;
  text-decoration: none;
  color: inherit;
  display: block;
}

.creator {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.creator img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  margin-right: 10px;
}

.creator-name {
  font-weight: 600;
}

.platform {
  font-size: 12px;
  color: #777;
}

.thumb {
  width: 100%;
  border-radius: 12px;
  margin: 8px 0;
}

.title {
  font-weight: 600;
}

.badge {
  display: inline-block;
  background: #6c4eff;
  color: white;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 6px;
  margin-left: 6px;
}

/* NAVBAR */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 420px;
  display: flex;
  background: white;
  padding: 12px 0;
  border-top: 1px solid #eee;
}

.nav-item {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: #777;
  text-decoration: none;
}

.nav-item.active {
  color: #6c4eff;
  font-weight: 600;
}
</style>

</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h1>Creator Hub</h1>
    <div class="avatar"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <a href="index.html" class="tab">Feed</a>
    <a href="catchup.html" class="tab active">Catch-Up</a>
  </div>

  <div class="page-title">Catch-Up (New Content)</div>

  <!-- CARD -->
  <a href="content-detail.html" class="card">
    <div class="creator">
      <img src="https://i.pravatar.cc/150?img=3">
      <div>
        <div class="creator-name">MrBeast</div>
        <div class="platform">YouTube</div>
      </div>
    </div>

    <img class="thumb" src="https://picsum.photos/400/210">

    <div class="title">
      I Built 100 Wells in Africa
      <span class="badge">NEW</span>
    </div>
  </a>

  <!-- CARD -->
  <a href="content-detail.html" class="card">
    <div class="creator">
      <img src="https://i.pravatar.cc/150?img=5">
      <div>
        <div class="creator-name">Nathan Berry</div>
        <div class="platform">TikTok</div>
      </div>
    </div>

    <img class="thumb" src="https://picsum.photos/400/211">

    <div class="title">
      6 Passive Income Ideas
      <span class="badge">NEW</span>
    </div>
  </a>

</div>

<!-- NAVBAR -->
<div class="nav">
  <a href="index.html" class="nav-item">Home</a>
  <a href="following.html" class="nav-item">Following</a>
  <a href="discover.html" class="nav-item">Discover</a>
  <a href="saved.html" class="nav-item">Saved</a>
  <a href="profile.html" class="nav-item">Profile</a>
</div>

</body>
</html>
