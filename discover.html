<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover - Creator Hub</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  background: linear-gradient(135deg, #f3eaff, #e6dcff);
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.header h1 {
  font-size: 22px;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

/* SEARCH */
.search {
  margin-bottom: 16px;
}

.search input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: #fff;
}

/* TABS */
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.tab {
  padding: 8px 14px;
  border-radius: 20px;
  background: #eee;
  font-size: 12px;
}

.tab.active {
  background: #6c4eff;
  color: white;
}

/* SECTION */
.section-title {
  font-weight: bold;
  margin: 16px 0 8px;
}

/* CARD */
.card {
  background: white;
  border-radius: 16px;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  text-decoration: none;
  color: black;
}

.left {
  display: flex;
  align-items: center;
}

.left img {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  margin-right: 10px;
}

.name {
  font-weight: bold;
}

.meta {
  font-size: 12px;
  color: gray;
}

.button {
  background: #6c4eff;
  color: white;
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 12px;
}

/* TOPICS */
.topics {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.topic {
  background: #f0f0f0;
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 12px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 420px;
  display: flex;
  justify-content: space-around;
  background: white;
  padding: 12px 0;
  border-top: 1px solid #eee;
}

.nav-item {
  font-size: 12px;
  color: #777;
  text-decoration: none;
}

.nav-item.active {
  color: #6c4eff;
  font-weight: 600;
}
</style>

</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h1>Discover</h1>
    <img class="avatar" src="https://i.pravatar.cc/100">
  </div>

  <!-- SEARCH -->
  <div class="search">
    <input placeholder="Search creators, topics...">
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active">Popular</div>
    <div class="tab">Trending</div>
    <div class="tab">Finance</div>
    <div class="tab">Gaming</div>
  </div>

  <!-- TRENDING -->
  <div class="section-title">Trending Creators</div>

  <a href="./creator.html" class="card">
    <div class="left">
      <img src="https://i.pravatar.cc/100?img=1">
      <div>
        <div class="name">Jordan Parker</div>
        <div class="meta">2.1M followers</div>
      </div>
    </div>
    <div class="button">Follow</div>
  </a>

  <a href="./creator.html" class="card">
    <div class="left">
      <img src="https://i.pravatar.cc/100?img=4">
      <div>
        <div class="name">Sarah Donovan</div>
        <div class="meta">1.8M followers</div>
      </div>
    </div>
    <div class="button">Follow</div>
  </a>

  <a href="./creator.html" class="card">
    <div class="left">
      <img src="https://i.pravatar.cc/100?img=7">
      <div>
        <div class="name">Alex Gomez</div>
        <div class="meta">1.5M followers</div>
      </div>
    </div>
    <div class="button">Follow</div>
  </a>

  <!-- TOPICS -->
  <div class="section-title">Popular Topics</div>

  <div class="topics">
    <div class="topic">Personal Finance</div>
    <div class="topic">YouTube Growth</div>
    <div class="topic">Self Improvement</div>
    <div class="topic">Startups</div>
    <div class="topic">AI Tools</div>
  </div>

</div>

<!-- NAVBAR -->
<div class="nav">
  <a href="./index.html" class="nav-item">Home</a>
  <a href="./following.html" class="nav-item">Following</a>
  <a href="./discover.html" class="nav-item active">Discover</a>
  <a href="./saved.html" class="nav-item">Saved</a>
  <a href="./profile.html" class="nav-item">Profile</a>
</div>

</body>
</html>
