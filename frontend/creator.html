<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator - Creator Hub</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  background: linear-gradient(135deg, #f3eaff, #e6dcff);
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  margin-bottom: 20px;
}

.back {
  font-size: 18px;
  margin-right: 10px;
  text-decoration: none;
  color: black;
}

.header-title {
  font-weight: 700;
  font-size: 18px;
}

/* CREATOR PROFILE */
.profile {
  text-align: center;
  margin-bottom: 20px;
}

.profile img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-bottom: 10px;
}

.name {
  font-size: 20px;
  font-weight: 700;
}

.username {
  font-size: 14px;
  color: #777;
  margin-bottom: 10px;
}

.stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  font-size: 14px;
  margin-bottom: 10px;
}

.bio {
  font-size: 14px;
  color: #555;
}

/* PLATFORM TABS */
.tabs {
  display: flex;
  background: #fff;
  border-radius: 12px;
  padding: 4px;
  margin: 20px 0;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 8px;
  border-radius: 10px;
  font-size: 14px;
  color: #777;
  font-weight: 600;
}

.tab.active {
  background: #6c4eff;
  color: white;
}

/* CONTENT CARD */
.card {
  background: white;
  border-radius: 16px;
  padding: 10px;
  margin-bottom: 12px;
}

.card img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 8px;
}

.title {
  font-weight: 600;
  font-size: 14px;
}

/* NAVBAR */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 420px;
  display: flex;
  justify-content: space-around;
  background: white;
  padding: 12px 0;
  border-top: 1px solid #eee;
}

.nav-item {
  text-align: center;
  font-size: 12px;
  color: #777;
  text-decoration: none;
}

.nav-item.active {
  color: #6c4eff;
  font-weight: 600;
}
</style>

</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <a href="index.html" class="back">←</a>
    <div class="header-title">Creator Hub</div>
  </div>

  <!-- PROFILE -->
  <div class="profile">
    <img src="https://i.pravatar.cc/150?img=12">

    <div class="name">Marques Brownlee</div>
    <div class="username">@mkbhd</div>

    <div class="stats">
      <div><strong>5.4M</strong> Followers</div>
      <div><strong>590</strong> Following</div>
    </div>

    <div class="bio">
      Tech reviewer · YouTuber · Podcaster
    </div>
  </div>

  <!-- PLATFORM TABS -->
  <div class="tabs">
    <div class="tab active">YouTube</div>
    <div class="tab">Instagram</div>
    <div class="tab">TikTok</div>
    <div class="tab">Twitch</div>
  </div>

  <!-- CONTENT -->
  <a href="content.html">
    <div class="card">
      <img src="https://picsum.photos/400/230">
      <div class="title">The Tesla of Electric Motorcycles</div>
    </div>
  </a>

  <a href="content.html">
    <div class="card">
      <img src="https://picsum.photos/400/231">
      <div class="title">When Tesla is Better than Porsche</div>
    </div>
  </a>

  <a href="content.html">
    <div class="card">
      <img src="https://picsum.photos/400/232">
      <div class="title">Reviewing Samsung AI Vacuum</div>
    </div>
  </a>

</div>

<!-- NAVBAR -->
<div class="nav">
  <a href="index.html" class="nav-item">Home</a>
  <a href="following.html" class="nav-item">Following</a>
  <a href="discover.html" class="nav-item">Discover</a>
  <a href="saved.html" class="nav-item">Saved</a>
</div>

</body>
</html>
