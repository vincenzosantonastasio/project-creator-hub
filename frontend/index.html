<!DOCTYPE html>
<html>
<head>
  <title>Creator Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #000;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      position: sticky;
      top: 0;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 10px;
    }

    .card {
      background: white;
      border-radius: 12px;
      margin-bottom: 15px;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .title {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .platform {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<header>Creator Hub</header>

<div class="container" id="app">
  Loading...
</div>

<script>
async function loadFeed() {
  try {
    const res = await fetch("/feed");
    const data = await res.json();

    const html = data.map(item => `
      <div class="card">
        <div class="title">${item.title}</div>
        <div class="platform">${item.platform}</div>
      </div>
    `).join("");

    document.getElementById("app").innerHTML = html;

  } catch (err) {
    document.getElementById("app").innerHTML = "Error loading data";
    console.error(err);
  }
}

loadFeed();
</script>

</body>
</html>
