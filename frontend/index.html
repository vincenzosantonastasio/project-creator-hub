<!DOCTYPE html>
<html>
<head>
  <title>Creator Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #000;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      position: sticky;
      top: 0;
    }

    .nav {
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 10px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 50px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 10px;
    }

    .banner {
      background: black;
      color: white;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      text-align: center;
      font-weight: bold;
    }

    .creator-group {
      margin-bottom: 20px;
      background: white;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .creator-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .creator-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .count-badge {
      background: red;
      color: white;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 12px;
    }

    .main-post {
      font-weight: bold;
      margin-bottom: 6px;
      cursor: pointer;
    }

    .sub-post {
      font-size: 14px;
      color: gray;
      margin-bottom: 4px;
      cursor: pointer;
    }

    .creator-card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .back {
      margin: 10px 0;
      color: blue;
      cursor: pointer;
    }

    .follow-btn {
      margin: 10px 0;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: black;
      color: white;
      cursor: pointer;
    }

  </style>
</head>

<body>

<header>Creator Hub</header>

<div class="nav">
  <button onclick="loadCreators()">Creators</button>
  <button onclick="loadFeed()">Feed</button>
  <button onclick="loadMyFeed()">My Feed</button>
</div>

<div class="container" id="output"></div>

<script>
const USER_ID = 1;

async function loadMyFeed() {
  const res = await fetch("http://localhost:3000/feed/user/1");
  const data = await res.json();

  const creatorsRes = await fetch("http://localhost:3000/creator");
  const creators = await creatorsRes.json();

  renderCatchUp(data, creators);
}

function renderCatchUp(data, creators) {

  if (data.length === 0) {
    document.getElementById("output").innerHTML =
      "<div class='banner'>You're all caught up ✔️</div>";
    return;
  }

  // group
  const grouped = {};
  data.forEach(c => {
    if (!grouped[c.creator_id]) grouped[c.creator_id] = [];
    grouped[c.creator_id].push(c);
  });

  const html = Object.keys(grouped).map(id => {
    const creator = creators.find(c => c.id == id);
    const posts = grouped[id];

    const latest = posts[0];
    const others = posts.slice(1);

    return `
      <div class="creator-group">

        <div class="creator-header">
          <div class="creator-info">
            <img src="${creator.avatar}" class="avatar"/>
            <strong>${creator.name}</strong>
          </div>

          <div class="count-badge">
            ${posts.length} new
          </div>
        </div>

        <div class="main-post" onclick="markSeen(${latest.creator_id}, ${latest.id})">
          ${latest.title}
        </div>

        ${others.map(p => `
          <div class="sub-post" onclick="markSeen(${p.creator_id}, ${p.id})">
            ${p.title}
          </div>
        `).join("")}

      </div>
    `;
  }).join("");

  document.getElementById("output").innerHTML = html;
}

async function markSeen(creatorId, contentId) {
  await fetch("http://localhost:3000/mark-seen", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId: USER_ID,
      creatorId,
      contentId
    })
  });

  loadMyFeed();
}

async function loadCreators() {
  const res = await fetch("http://localhost:3000/creator");
  const data = await res.json();

  const html = data.map(c => `
    <div class="creator-card" onclick="loadCreator(${c.id})">
      <img src="${c.avatar}" class="avatar"/>
      <div>
        <strong>${c.name}</strong><br/>
        ${c.platforms.join(", ")}
      </div>
    </div>
  `).join("");

  document.getElementById("output").innerHTML = html;
}

async function loadCreator(id) {
  const res = await fetch("http://localhost:3000/creator/" + id);
  const data = await res.json();

  const contentHtml = data.content.map(c => `
    <div class="main-post">${c.title}</div>
  `).join("");

  document.getElementById("output").innerHTML = `
    <div class="back" onclick="loadCreators()">← Back</div>
    <h2>${data.name}</h2>
    ${contentHtml}
  `;
}

async function loadFeed() {
  const res = await fetch("http://localhost:3000/feed");
  const data = await res.json();

  document.getElementById("output").innerHTML =
    "<div class='banner'>Global feed loaded</div>";
}
</script>

</body>
</html>
