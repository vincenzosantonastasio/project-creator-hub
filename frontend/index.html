<!DOCTYPE html>
<html>
<head>
  <title>Creator Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #000;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      position: sticky;
      top: 0;
    }

    .nav {
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 10px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 50px;
    }

    .nav button {
      border: none;
      background: none;
      font-weight: bold;
      cursor: pointer;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 10px;
    }

    .feed-card {
      background: white;
      border-radius: 12px;
      margin-bottom: 15px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .feed-header {
      padding: 10px;
      font-size: 14px;
      color: gray;
    }

    .feed-title {
      padding: 0 10px 10px 10px;
      font-size: 16px;
      font-weight: bold;
    }

    .feed-footer {
      padding: 10px;
      font-size: 12px;
      color: gray;
    }

    .new-badge {
      background: red;
      color: white;
      padding: 2px 6px;
      font-size: 10px;
      border-radius: 4px;
      margin-left: 6px;
    }

    .creator-card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      cursor: pointer;
    }

    .back {
      margin: 10px 0;
      color: blue;
      cursor: pointer;
    }

    .follow-btn {
      margin: 10px 0;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: black;
      color: white;
      cursor: pointer;
    }

  </style>

</head>
<body>

  <header>Creator Hub</header>

  <div class="nav">
    <button onclick="loadCreators()">Creators</button>
    <button onclick="loadFeed()">Feed</button>
    <button onclick="loadMyFeed()">My Feed</button>
  </div>

  <div class="container" id="output"></div>

  <script>
    const USER_ID = 1;

    async function loadFeed() {
      const res = await fetch("http://localhost:3000/feed");
      const data = await res.json();

      renderFeed(data, false);
    }

    async function loadMyFeed() {
      const res = await fetch("http://localhost:3000/feed/user/1");
      const data = await res.json();

      renderFeed(data, true);
    }

    function renderFeed(data, isPersonalized) {
      const html = data.map(c => `
        <div class="feed-card" onclick="markSeen(${c.creator_id}, ${c.id})">
          <div class="feed-header">
            Creator #${c.creator_id}
          </div>

          <div class="feed-title">
            ${c.title}
            ${isPersonalized ? '<span class="new-badge">NEW</span>' : ''}
          </div>

          <div class="feed-footer">
            ${c.platform}
          </div>
        </div>
      `).join("");

      document.getElementById("output").innerHTML = html;
    }

    async function markSeen(creatorId, contentId) {
      await fetch("http://localhost:3000/mark-seen", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          userId: USER_ID,
          creatorId: creatorId,
          contentId: contentId
        })
      });
    }

    async function loadCreators() {
      const res = await fetch("http://localhost:3000/creator");
      const data = await res.json();

      const html = data.map(c => `
        <div class="creator-card" onclick="loadCreator(${c.id})">
          <strong>${c.name}</strong><br/>
          ${c.platforms.join(", ")}
        </div>
      `).join("");

      document.getElementById("output").innerHTML = html;
    }

    async function loadCreator(id) {
      const res = await fetch("http://localhost:3000/creator/" + id);
      const data = await res.json();

      const isFollowing = await checkFollowing(id);

      const contentHtml = data.content.map(c => `
        <div class="feed-card" onclick="markSeen(${id}, ${c.id})">
          <div class="feed-title">${c.title}</div>
          <div class="feed-footer">${c.platform}</div>
        </div>
      `).join("");

      document.getElementById("output").innerHTML = `
        <div class="back" onclick="loadCreators()">← Back</div>
        <h2>${data.name}</h2>

        <button class="follow-btn" onclick="toggleFollow(${id}, ${isFollowing})">
          ${isFollowing ? "Unfollow" : "Follow"}
        </button>

        ${contentHtml}
      `;
    }

    async function checkFollowing(creatorId) {
      const res = await fetch("http://localhost:3000/user/1/following");
      const data = await res.json();
      return data.some(c => c.id === creatorId);
    }

    async function toggleFollow(creatorId, isFollowing) {
      const endpoint = isFollowing ? "unfollow" : "follow";

      await fetch("http://localhost:3000/" + endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          userId: USER_ID,
          creatorId: creatorId
        })
      });

      loadCreator(creatorId);
    }
  </script>

</body>
</html>
