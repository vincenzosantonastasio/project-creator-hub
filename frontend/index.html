<!DOCTYPE html>
<html>
<head>
  <title>Creator Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #000;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      position: sticky;
      top: 0;
    }

    .nav {
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 10px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 50px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 10px;
    }

    .banner {
      background: black;
      color: white;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      text-align: center;
      font-weight: bold;
    }

    .creator-group {
      margin-bottom: 20px;
    }

    .creator-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .feed-card {
      background: white;
      border-radius: 10px;
      margin-bottom: 8px;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      cursor: pointer;
    }

    .new-badge {
      background: red;
      color: white;
      padding: 2px 6px;
      font-size: 10px;
      border-radius: 4px;
      margin-left: 6px;
    }

    .creator-card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .back {
      margin: 10px 0;
      color: blue;
      cursor: pointer;
    }

    .follow-btn {
      margin: 10px 0;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: black;
      color: white;
      cursor: pointer;
    }

  </style>
</head>

<body>

<header>Creator Hub</header>

<div class="nav">
  <button onclick="loadCreators()">Creators</button>
  <button onclick="loadFeed()">Feed</button>
  <button onclick="loadMyFeed()">My Feed</button>
</div>

<div class="container" id="output"></div>

<script>
const USER_ID = 1;

async function loadMyFeed() {
  const res = await fetch("http://localhost:3000/feed/user/1");
  const data = await res.json();

  const creatorsRes = await fetch("http://localhost:3000/creator");
  const creators = await creatorsRes.json();

  renderGroupedFeed(data, creators, true);
}

async function loadFeed() {
  const res = await fetch("http://localhost:3000/feed");
  const data = await res.json();

  const creatorsRes = await fetch("http://localhost:3000/creator");
  const creators = await creatorsRes.json();

  renderGroupedFeed(data, creators, false);
}

function renderGroupedFeed(data, creators, isPersonalized) {

  let banner = "";
  if (isPersonalized && data.length > 0) {
    banner = `<div class="banner">You have ${data.length} new content</div>`;
  }

  // group by creator
  const grouped = {};

  data.forEach(c => {
    if (!grouped[c.creator_id]) {
      grouped[c.creator_id] = [];
    }
    grouped[c.creator_id].push(c);
  });

  const html = Object.keys(grouped).map(creatorId => {
    const creator = creators.find(c => c.id == creatorId);

    const posts = grouped[creatorId].map(post => `
      <div class="feed-card" onclick="markSeen(${post.creator_id}, ${post.id})">
        ${post.title}
        ${isPersonalized ? '<span class="new-badge">NEW</span>' : ''}
      </div>
    `).join("");

    return `
      <div class="creator-group">
        <div class="creator-header">
          <img src="${creator.avatar}" class="avatar"/>
          <strong>${creator.name}</strong>
        </div>
        ${posts}
      </div>
    `;
  }).join("");

  document.getElementById("output").innerHTML = banner + html;
}

async function markSeen(creatorId, contentId) {
  await fetch("http://localhost:3000/mark-seen", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId: USER_ID,
      creatorId,
      contentId
    })
  });
}

async function loadCreators() {
  const res = await fetch("http://localhost:3000/creator");
  const data = await res.json();

  const html = data.map(c => `
    <div class="creator-card" onclick="loadCreator(${c.id})">
      <img src="${c.avatar}" class="avatar"/>
      <div>
        <strong>${c.name}</strong><br/>
        ${c.platforms.join(", ")}
      </div>
    </div>
  `).join("");

  document.getElementById("output").innerHTML = html;
}

async function loadCreator(id) {
  const res = await fetch("http://localhost:3000/creator/" + id);
  const data = await res.json();

  const isFollowing = await checkFollowing(id);

  const contentHtml = data.content.map(c => `
    <div class="feed-card" onclick="markSeen(${id}, ${c.id})">
      ${c.title}
    </div>
  `).join("");

  document.getElementById("output").innerHTML = `
    <div class="back" onclick="loadCreators()">← Back</div>
    <h2>${data.name}</h2>

    <button class="follow-btn" onclick="toggleFollow(${id}, ${isFollowing})">
      ${isFollowing ? "Unfollow" : "Follow"}
    </button>

    ${contentHtml}
  `;
}

async function checkFollowing(creatorId) {
  const res = await fetch("http://localhost:3000/user/1/following");
  const data = await res.json();
  return data.some(c => c.id === creatorId);
}

async function toggleFollow(creatorId, isFollowing) {
  const endpoint = isFollowing ? "unfollow" : "follow";

  await fetch("http://localhost:3000/" + endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userId: USER_ID,
      creatorId
    })
  });

  loadCreator(creatorId);
}
</script>

</body>
</html>
