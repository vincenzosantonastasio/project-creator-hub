<!DOCTYPE html>
<html>
<head>
  <title>Creator Hub</title>
</head>
<body>

  <h1>Creator Hub</h1>

  <button onclick="loadCreators()">Load Creators</button>
  <button onclick="loadFeed()">Load Feed</button>

  <div id="output"></div>

  <script>
    async function loadCreators() {
      const res = await fetch("http://localhost:3000/creator");
      const data = await res.json();

      document.getElementById("output").innerHTML =
        "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
    }

    async function loadFeed() {
      const res = await fetch("http://localhost:3000/feed");
      const data = await res.json();

      document.getElementById("output").innerHTML =
        "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
    }
  </script>

</body>
</html>
