<!DOCTYPE html>
<html>
<head>
  <title>Creator Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #000;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      position: sticky;
      top: 0;
    }

    .nav {
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 10px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 50px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 10px;
    }

    .creator-group {
      margin-bottom: 20px;
      background: white;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .creator-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .creator-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .count-badge {
      background: red;
      color: white;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 12px;
    }

    .post {
      padding: 6px 0;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    .post:hover {
      opacity: 0.6;
    }

    /* 🔥 ANIMATION */
    .removing {
      opacity: 0;
      transform: translateX(20px);
    }

    .empty {
      text-align: center;
      padding: 20px;
      color: gray;
    }

  </style>
</head>

<body>

<header>Creator Hub</header>

<div class="nav">
  <button onclick="loadMyFeed()">My Feed</button>
</div>

<div class="container" id="output"></div>

<script>
const USER_ID = 1;

let currentFeed = [];
let creatorsData = [];

async function loadMyFeed() {
  const res = await fetch("http://localhost:3000/feed/user/1");
  currentFeed = await res.json();

  const creatorsRes = await fetch("http://localhost:3000/creator");
  creatorsData = await creatorsRes.json();

  render();
}

function render() {

  if (currentFeed.length === 0) {
    document.getElementById("output").innerHTML =
      "<div class='empty'>You're all caught up ✔️</div>";
    return;
  }

  const grouped = {};

  currentFeed.forEach(c => {
    if (!grouped[c.creator_id]) grouped[c.creator_id] = [];
    grouped[c.creator_id].push(c);
  });

  const html = Object.keys(grouped).map(id => {
    const creator = creatorsData.find(c => c.id == id);
    const posts = grouped[id];

    return `
      <div class="creator-group">

        <div class="creator-header">
          <div class="creator-info">
            <img src="${creator.avatar}" class="avatar"/>
            <strong>${creator.name}</strong>
          </div>

          <div class="count-badge">
            ${posts.length}
          </div>
        </div>

        ${posts.map(p => `
          <div class="post" id="post-${p.id}" onclick="markSeen(${p.creator_id}, ${p.id})">
            ${p.title}
          </div>
        `).join("")}

      </div>
    `;
  }).join("");

  document.getElementById("output").innerHTML = html;
}

async function markSeen(creatorId, contentId) {

  const el = document.getElementById("post-" + contentId);

  if (el) {
    el.classList.add("removing");
  }

  // wait animation
  setTimeout(() => {
    currentFeed = currentFeed.filter(c => c.id !== contentId);
    render();
  }, 200);

  await fetch("http://localhost:3000/mark-seen", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId: USER_ID,
      creatorId,
      contentId
    })
  });
}
</script>

</body>
</html>
